  <title>Rock paper scissors</title>

<body>

  <!-- this project create rock paper scissors -->
  <p>Rock Paper Scissors</p>

  <button onclick="
    const randomNumber = Math.random();

    let computerSimple = '';

    if (randomNumber >= 0 && randomNumber < 1/3 ) {
      computerSimple = 'rock';
    } else if (randomNumber >= 1/3 && randomNumber < 2/3 ) {
      computerSimple = 'paper';
    } else if (randomNumber >= 2/3 && randomNumber < 1) {
      computerSimple = 'scissors';
    }

    let result = '';

    if (computerSimple === 'rock') {
      result = 'tie';
    } else if (computerSimple === 'paper') {
      result = 'lose';
    } else if (computerSimple === 'scissors') {
      result = 'win';
    }

    alert(`You pick rock, Computer picked ${computerSimple} and You ${result}`);

  ">Rock</button>
